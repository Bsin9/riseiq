<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 46" fill="none" role="img" aria-label="RiseIQ logo — monochrome">

  <!-- Ascending connector line -->
  <line x1="7" y1="38" x2="37" y2="8" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Node 1: Foundation -->
  <circle cx="7" cy="38" r="3.5" fill="#000000"/>

  <!-- Node 2: Momentum with white ring -->
  <circle cx="22" cy="23" r="6.5" fill="white"/>
  <circle cx="22" cy="23" r="5" fill="#1A1A1A"/>

  <!-- Node 3: Achievement (larger, white ring) -->
  <circle cx="37" cy="8" r="8" fill="white"/>
  <circle cx="37" cy="8" r="6.5" fill="#000000"/>

  <!-- Wordmark -->
  <text x="56" y="33" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="27" font-weight="800" letter-spacing="-0.8" fill="#000000">RiseIQ</text>
</svg>
