<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 46" fill="none" role="img" aria-label="RiseIQ logo — reversed">
  <defs>
    <linearGradient id="dark-line-grad" x1="7" y1="38" x2="37" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- Ascending connector line -->
  <line x1="7" y1="38" x2="37" y2="8" stroke="url(#dark-line-grad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Node 1: Foundation (white, low opacity) -->
  <circle cx="7" cy="38" r="3.5" fill="rgba(255,255,255,0.45)"/>

  <!-- Node 2: Momentum (teal-light) with dark ring -->
  <circle cx="22" cy="23" r="6.5" fill="rgba(45,212,191,0.2)"/>
  <circle cx="22" cy="23" r="5" fill="#2DD4BF"/>

  <!-- Node 3: Achievement (gold) -->
  <circle cx="37" cy="8" r="10" fill="rgba(245,166,35,0.15)"/>
  <circle cx="37" cy="8" r="6.5" fill="#F5A623"/>

  <!-- Wordmark: white + teal-light -->
  <text x="56" y="33" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="27" font-weight="800" letter-spacing="-0.8">
    <tspan fill="#FFFFFF">Rise</tspan><tspan fill="#2DD4BF">IQ</tspan>
  </text>
</svg>
